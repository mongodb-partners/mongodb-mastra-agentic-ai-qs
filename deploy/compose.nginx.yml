# Compose override adding an nginx reverse proxy on :80 in front of the app (:8000),
# so the deployed box serves a clean `http://<public-ip>/` URL. Applied on the EC2 box:
#   docker compose -f docker-compose.yml -f deploy/compose.nginx.yml up -d --build
#
# The app serves BOTH the console SPA and /api/* on one origin (port 8000), so nginx
# proxies ALL paths through. The /api/ block turns buffering OFF — Marshal's live feed
# is a Server-Sent Events stream (/api/stream over change streams), and buffering would
# stall it. This is load-bearing, not cosmetic.
services:
  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.app.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
