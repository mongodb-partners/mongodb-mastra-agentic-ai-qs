server {
    listen 80;
    server_name _;

    # Resolve the `app` service name via Docker's embedded DNS on every request. Using a
    # variable in proxy_pass (rather than a literal host) forces per-request resolution, so
    # when the app container is recreated with a new IP (e.g. a rebuild) nginx picks it up
    # instead of caching the old IP at startup and returning 502 (Connection refused).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # The app serves the console SPA and /api/* on one origin at :8000. Proxy everything;
    # the /api/ block adds SSE-friendly settings so the live agent-operations feed
    # (/api/stream, a projection of MongoDB change streams) reaches the browser as events
    # are produced — no buffering, long read timeout.
    location /api/ {
        set $upstream_app app;
        proxy_pass http://$upstream_app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    location / {
        set $upstream_app app;
        proxy_pass http://$upstream_app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
