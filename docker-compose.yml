# One-command self-hosted run of Marshal (API + console SPA on one origin),
# against a MongoDB Atlas cluster.
#
# Usage:
#   cp .env.example .env          # fill MONGODB_URI, MONGODB_DB, VOYAGE_API_KEY, secrets…
#   docker compose up --build
#   # then, once, against Atlas (not part of the image build):
#   pnpm provision && pnpm restore:replay      # demo mode — no LLM needed
#
# No Mongo service here on purpose: the app targets Atlas (vector/search/graph +
# change streams), so MONGODB_URI must point at your cluster.
name: marshal

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: marshal:latest
    env_file: .env
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 4s
      start_period: 20s
      retries: 3
    restart: unless-stopped
