allowBuilds:
  esbuild: true
# Force patched dev/build tooling across the tree (all transitive via vitest/mastra/tsx, none ship
# in the runtime image). Resolves Dependabot alerts: vite fs.deny bypass + path traversal (< 6.4.3),
# esbuild dev-server request smuggling (< 0.25).
overrides:
  vite: "^6.4.3"
  esbuild: ">=0.25.0"
